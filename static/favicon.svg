<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Hanko stamp: vermillion rounded square -->
  <rect x="2" y="2" width="28" height="28" rx="4" ry="4" fill="#C03020" />
  <!-- Subtle inner border to evoke carved stamp edge -->
  <rect x="3.5" y="3.5" width="25" height="25" rx="2.8" ry="2.8" fill="none" stroke="#FFFFFF" stroke-width="0.7" opacity="0.25" />
  <!-- Kanji 学 (manabu — to learn) in white, centered -->
  <text x="16" y="24.5" text-anchor="middle" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho','Noto Serif JP',serif" font-size="22" font-weight="700" fill="#FFFFFF" letter-spacing="0">学</text>
</svg>
